name: Deploy site para GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Copiar site/ + planos/ para raiz
        run: |
          rm -rf .github node_modules
          cp -r petrobras-quimica-study-plan/site/* .
          cp -r petrobras-quimica-study-plan/planos .
          rm -rf petrobras-quimica-study-plan

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
