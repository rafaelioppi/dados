<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estudo Petrobras - Técnico em Química</title>
  <base href="/">
  <link rel="stylesheet" href="css/estilo.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div id="app">
    <div v-if="carregando" style="display:flex;align-items:center;justify-content:center;height:100vh;font-size:18px;color:var(--texto-sec);">
      Carregando...
    </div>
    <template v-if="!carregando">
    <aside class="sidebar" :class="{ aberta: menuAberta }">
      <div class="sidebar-logo">
        <h1>Petrobras 2026</h1>
        <span>Técnico em Química • Cesgranrio</span>
      </div>
      <nav class="sidebar-nav">
        <a href="#dashboard" class="nav-item" :class="{ ativa: view === 'dashboard' }" @click.prevent="irPara('dashboard')">
          <span class="icone">📊</span> Dashboard
        </a>
        <a href="#checklist" class="nav-item" :class="{ ativa: view === 'checklist' }" @click.prevent="irPara('checklist')">
          <span class="icone">✅</span> Conteúdos
        </a>
        <a href="#ciclo" class="nav-item" :class="{ ativa: view === 'ciclo' }" @click.prevent="irPara('ciclo')">
          <span class="icone">🔄</span> Ciclo
        </a>
        <a href="#horas" class="nav-item" :class="{ ativa: view === 'horas' }" @click.prevent="irPara('horas')">
          <span class="icone">⏱</span> Horas
        </a>
        <a href="#simulados" class="nav-item" :class="{ ativa: view === 'simulados' }" @click.prevent="irPara('simulados')">
          <span class="icone">📋</span> Simulados
        </a>
        <a href="#erros" class="nav-item" :class="{ ativa: view === 'erros' }" @click.prevent="irPara('erros')">
          <span class="icone">📕</span> Erros
        </a>
        <a href="#diario" class="nav-item" :class="{ ativa: view === 'diario' }" @click.prevent="irPara('diario')">
          <span class="icone">📌</span> Diário
        </a>
        <a href="#cronograma" class="nav-item" :class="{ ativa: view === 'cronograma' }" @click.prevent="irPara('cronograma')">
          <span class="icone">📅</span> Cronograma
        </a>
        <div style="border-top:1px solid rgba(255,255,255,0.08);margin:8px 16px;"></div>
        <a href="#plano" class="nav-item" :class="{ ativa: view === 'plano' }" @click.prevent="irPara('plano')">
          <span class="icone">📖</span> Plano de Estudos
        </a>
      </nav>
      <div style="padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.08);">
        <button class="nav-item" @click="alternarTema" style="font-size:13px;">
          <span class="icone">{{ tema === 'dark' ? '☀️' : '🌙' }}</span>
          {{ tema === 'dark' ? 'Tema Claro' : 'Tema Escuro' }}
        </button>
      </div>
    </aside>

    <main class="conteudo">
      <div class="topo">
        <div>
          <button class="menu-toggle" @click="menuAberta = !menuAberta">☰</button>
          <h2>{{ tituloView }}</h2>
          <span class="sub">{{ subtituloView }}</span>
        </div>
      </div>

      <transition name="fade" mode="out-in">
        <div :key="view">
          <!-- DASHBOARD --> 
        <template v-if="view === 'dashboard'">
          <div class="grade-cartoes">
            <div class="cartao-stat verde">
              <div class="valor">{{ progressoGeral }}%</div>
              <div class="rotulo">Conteúdo Estudado</div>
            </div>
            <div class="cartao-stat">
              <div class="valor">{{ horasSemanaAtual }}</div>
              <div class="rotulo">h nesta semana</div>
            </div>
            <div class="cartao-stat" :class="metaSemanaCss">
              <div class="valor">{{ horasSemanaAtual }}/{{ metaHoras }}</div>
              <div class="rotulo">Meta semanal (h)</div>
            </div>
            <div class="cartao-stat" :class="simuladoStatus.classe">
              <div class="valor">{{ simuladoStatus.texto }}</div>
              <div class="rotulo">Último simulado</div>
            </div>
          </div>

          <div class="grade-cartoes">
            <div class="cartao-stat" style="border-top-color:#8b5cf6;">
              <div class="valor" style="font-size:20px;color:#8b5cf6;">{{ totalErros }}</div>
              <div class="rotulo">Erros no caderno</div>
            </div>
            <div class="cartao-stat" :class="diarioProgresso >= 100 ? 'verde' : ''">
              <div class="valor" style="font-size:20px;">{{ diarioProgresso }}%</div>
              <div class="rotulo">Checklist de hoje</div>
            </div>
            <div class="cartao-stat" style="border-top-color:#8b5cf6;">
              <div class="valor" style="font-size:20px;color:#8b5cf6;">{{ cicloCompleto }}%</div>
              <div class="rotulo">Ciclo concluído</div>
            </div>
            <div class="cartao-stat" :class="revisoesHoje.length > 0 ? 'vermelho' : 'verde'">
              <div class="valor" style="font-size:20px;">{{ revisoesHoje.length }}</div>
              <div class="rotulo">Revisões hoje</div>
            </div>
          </div>

          <div class="card">
            <div class="card-titulo">Progresso por Matéria</div>
            <div v-for="m in conteudos" :key="m.id" class="materia-progresso">
              <div class="cabecalho">
                <span class="nome">{{ m.icone }} {{ m.nome }}</span>
                <span class="pct">{{ progressoMateria(m) }}% ({{ itensConcluidos(m) }}/{{ totalItens(m) }})</span>
              </div>
              <div class="barra-progresso">
                <div class="preenchimento" :style="{ width: progressoMateria(m)+'%', background: m.cor }"></div>
              </div>
            </div>
          </div>

          <div class="card">
            <div class="card-titulo">Resumo do Plano</div>
            <div style="font-size:14px; line-height:1.8; color:var(--texto-sec);">
              <strong style="color:var(--texto)">12 semanas</strong> de estudo ·
              <strong style="color:var(--texto)">{{ metaHoras }}h/semana</strong> ·
              <strong style="color:var(--texto)">60 questões</strong> (20 básicas eliminatórias + 40 específicas classificatórias)<br>
              Banca: <strong>Cesgranrio</strong> · Última prova referência: 2018
            </div>
          </div>
        </template>

        <!-- CHECKLIST -->
        <template v-if="view === 'checklist'">
          <div class="grade-cartoes">
            <div v-for="m in conteudos" :key="m.id" class="cartao-stat" :style="{ borderTopColor: m.cor }">
              <div class="valor" :style="{ color: m.cor }">{{ progressoMateria(m) }}%</div>
              <div class="rotulo">{{ m.icone }} {{ m.nome }}</div>
            </div>
          </div>

          <div class="card">
            <div class="card-titulo">
              <span>Conteúdos Detalhados</span>
              <span style="font-size:14px;color:var(--texto-sec);font-weight:400;">
                {{ totalConcluidoGeral }}/{{ totalGeral }} concluídos
              </span>
            </div>

            <!-- P1: Busca e Botões -->
            <div style="margin-bottom:16px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
              <input v-model="filtro" type="text" placeholder="🔍 Buscar tópico..." 
                style="flex:1;min-width:200px;padding:8px 12px;border:1px solid var(--borda);border-radius:4px;background:var(--fundo-sec);color:var(--texto);font-size:13px;">
              <button @click="expandirTudo" style="padding:8px 12px;background:var(--primaria);color:white;border:none;border-radius:4px;cursor:pointer;font-size:13px;font-weight:500;transition:background 0.2s;">
                📂 Expandir Tudo
              </button>
              <button @click="colapsarTudo" style="padding:8px 12px;background:var(--texto-sec);color:white;border:none;border-radius:4px;cursor:pointer;font-size:13px;font-weight:500;transition:background 0.2s;">
                 📁 Colapsar Tudo
              </button>
            </div>

            <div v-for="m in (filtro ? conteudosFiltrados : conteudos)" :key="m.id" style="margin-bottom:24px;">
              <h3 style="font-size:16px;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--borda);">
                {{ m.icone }} {{ m.nome }}
                <span style="font-size:13px;color:var(--texto-sec);font-weight:400;">
                  ({{ itensConcluidos(m) }}/{{ totalItens(m) }})
                </span>
              </h3>
              <div v-for="g in m.grupos" :key="g.nome" class="grupo-checklist">
                <div class="grupo-titulo" @click="toggleGrupo(m.id, g.nome)">
                  {{ gruposAbertos[m.id+'-'+g.nome] ? '▼' : '▶' }} {{ g.nome }}
                  <span style="font-size:12px;color:var(--texto-sec);font-weight:400;">
                    ({{ itensConcluidosGrupo(m.id, g) }}/{{ g.topicos.length }})
                  </span>
                </div>
                <div v-show="gruposAbertos[m.id+'-'+g.nome]">
                  <div v-for="(t, idx) in g.topicos" :key="t"
                    class="item-check"
                    :class="{ concluido: checkId(m.id, g.nome, idx) }"
                    @click="alternarItem(m.id, g.nome, idx)">
                    <input type="checkbox" :checked="checkId(m.id, g.nome, idx)" @click.stop>
                    <span class="texto">{{ t }}</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </template>

        <!-- HORAS -->
        <template v-if="view === 'horas'">
          <div class="grade-cartoes" style="margin-bottom:20px;">
            <div class="cartao-stat verde">
              <div class="valor">{{ horasSemanaAtual }}</div>
              <div class="rotulo">h nesta semana</div>
            </div>
            <div class="cartao-stat" :class="metaSemanaCss">
              <div class="valor">{{ horasSemanaAtual }}/{{ metaHoras }}</div>
              <div class="rotulo">Meta semanal (h)</div>
            </div>
            <div class="cartao-stat">
              <div class="valor">{{ totalHorasAcumuladas }}h</div>
              <div class="rotulo">Total acumulado ({{ Math.round(totalHorasAcumuladas/360*100) }}% da meta)</div>
            </div>
          </div>

          <div class="card">
            <div class="card-titulo">
              <div class="navegacao-semanas">
                <button @click="semanaAtual--">‹ Anterior</button>
                <strong>Semana {{ semanaAtual }}</strong>
                <button @click="semanaAtual++" :disabled="semanaAtual >= semanasPlano">Próxima ›</button>
              </div>
            </div>
            <table class="tabela-horas">
              <thead>
                <tr>
                  <th>Dia</th>
                  <th>Português</th>
                  <th>Matemática</th>
                  <th>Química</th>
                  <th>Total</th>
                </tr>
              </thead>
              <tbody>
                <tr v-for="dia in diasSemana" :key="dia.valor">
                  <td style="font-weight:600;">{{ dia.rotulo }}</td>
                  <td><input type="number" min="0" max="6" step="0.5"
                    :value="horaValor(semanaAtual, dia.valor, 'portugues')"
                    @input="setHora(semanaAtual, dia.valor, 'portugues', $event.target.value)"></td>
                  <td><input type="number" min="0" max="6" step="0.5"
                    :value="horaValor(semanaAtual, dia.valor, 'matematica')"
                    @input="setHora(semanaAtual, dia.valor, 'matematica', $event.target.value)"></td>
                  <td><input type="number" min="0" max="6" step="0.5"
                    :value="horaValor(semanaAtual, dia.valor, 'quimica')"
                    @input="setHora(semanaAtual, dia.valor, 'quimica', $event.target.value)"></td>
                  <td class="total-linha">{{ totalDia(semanaAtual, dia.valor) }}</td>
                </tr>
              </tbody>
              <tfoot>
                <tr>
                  <td style="font-weight:700;">Total</td>
                  <td class="total-coluna">{{ totalMateriaSemana(semanaAtual, 'portugues') }}</td>
                  <td class="total-coluna">{{ totalMateriaSemana(semanaAtual, 'matematica') }}</td>
                  <td class="total-coluna">{{ totalMateriaSemana(semanaAtual, 'quimica') }}</td>
                  <td class="total-coluna" style="color:var(--primaria);font-weight:700;">{{ horasSemana(semanaAtual) }}</td>
                </tr>
              </tfoot>
            </table>
          </div>

          <div class="card">
            <div class="card-titulo">Acumulado por Semana</div>
            <table class="tabela-horas">
              <thead>
                <tr>
                  <th>Semana</th>
                  <th>P</th>
                  <th>M</th>
                  <th>Q</th>
                  <th>Total</th>
                  <th>Meta</th>
                  <th>%</th>
                </tr>
              </thead>
              <tbody>
                <tr v-for="s in semanasPlano" :key="s">
                  <td style="font-weight:600;">{{ s }}</td>
                  <td>{{ totalMateriaSemana(s, 'portugues') }}</td>
                  <td>{{ totalMateriaSemana(s, 'matematica') }}</td>
                  <td>{{ totalMateriaSemana(s, 'quimica') }}</td>
                  <td class="total-linha">{{ horasSemana(s) }}</td>
                  <td>{{ metaHoras }}</td>
                  <td>{{ metaHoras > 0 ? Math.round(horasSemana(s)/metaHoras*100) : 0 }}%</td>
                </tr>
              </tbody>
              <tfoot>
                <tr>
                  <td style="font-weight:700;">Total</td>
                  <td class="total-coluna">{{ totalAcumulado('portugues') }}</td>
                  <td class="total-coluna">{{ totalAcumulado('matematica') }}</td>
                  <td class="total-coluna">{{ totalAcumulado('quimica') }}</td>
                  <td class="total-coluna" style="color:var(--primaria);font-weight:700;">{{ totalHorasAcumuladas }}</td>
                  <td>{{ totalMeta }}</td>
                  <td>{{ totalMeta > 0 ? Math.round(totalHorasAcumuladas/totalMeta*100) : 0 }}%</td>
                </tr>
              </tfoot>
            </table>
          </div>
        </template>

        <!-- CRONOGRAMA SEMANAL -->
        <div v-if="view === 'cronograma'" key="cronograma">
          <div class="cron-topo">
            <div class="cron-nav">
              <button @click="cronSemana--" :disabled="cronSemana <= 1" class="cron-nav-btn">‹</button>
              <div class="cron-nav-info">
                <span class="cron-nav-semana">Semana {{ cronSemana }} de {{ cronograma.length }}</span>
                <span class="cron-nav-titulo">{{ cronograma[cronSemana-1]?.titulo }}</span>
              </div>
              <button @click="cronSemana++" :disabled="cronSemana >= cronograma.length" class="cron-nav-btn">›</button>
            </div>
            <select v-model.number="cronSemana" class="cron-select">
              <option v-for="s in cronograma" :key="s.semana" :value="s.semana">
                Semana {{ s.semana }} — {{ s.titulo }}
              </option>
            </select>
          </div>

          <div class="cron-tabela-wrapper">
            <table class="cron-tabela">
              <thead>
                <tr>
                  <th class="cron-th-dia">Dia</th>
                  <th v-for="p in periodos" :key="p" class="cron-th-horario">
                    <span class="cron-horario-badge">{{ p }}</span>
                  </th>
                </tr>
              </thead>
              <tbody>
                <tr v-for="d in semanaAtualDias" :key="d.dia" class="cron-linha">
                  <td class="cron-dia-label">{{ d.dia }}</td>
                  <td v-for="(slot, si) in d.slots" :key="si" class="cron-cell">
                    <div class="cron-materia-badge" :style="{ background: materiaInfo(slot.cod).cor + '18', color: materiaInfo(slot.cod).cor, borderLeftColor: materiaInfo(slot.cod).cor }">
                      <span class="cron-materia-icon">{{ materiaInfo(slot.cod).icone }}</span>
                      <span class="cron-materia-nome">{{ materiaInfo(slot.cod).nome }}</span>
                    </div>
                    <div class="cron-conteudo">{{ slot.conteudo }}</div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

          <div class="cron-legenda">
            <span v-for="m in materiasList" :key="m.cod" class="cron-legenda-item">
              <span class="cron-legenda-dot" :style="{ background: m.cor }"></span>
              {{ m.icone }} {{ m.nome }}
            </span>
          </div>
        </div>

        <!-- PLANO -->
        <template v-if="view === 'plano'">
          <div class="card" style="margin-bottom:16px;">
            <div class="card-titulo" style="margin-bottom:0;">
              <select v-model="planoSelecionado" @change="carregarPlano"
                style="flex:1;padding:10px 14px;border:1px solid var(--borda);border-radius:8px;font-size:14px;font-family:inherit;background:var(--card);color:var(--texto);outline:none;cursor:pointer;">
                <optgroup v-for="g in planosGrupos" :key="g" :label="g">
                  <option v-for="p in planosFiltrados(g)" :key="p.id" :value="p.id">{{ p.nome }}</option>
                </optgroup>
              </select>
            </div>
          </div>
          <div class="card" v-if="carregandoPlano" style="text-align:center;padding:40px;color:var(--texto-sec);">
            Carregando...
          </div>
          <div class="card plano-conteudo" v-if="!carregandoPlano && planoHtml" v-html="planoHtml"></div>
          <div class="card" v-if="!carregandoPlano && !planoHtml" style="text-align:center;padding:40px;color:var(--texto-sec);">
            Selecione um documento acima para visualizar.
          </div>
        </template>

        <!-- SIMULADOS -->
        <template v-if="view === 'simulados'">
          <div class="grade-cartoes">
            <div class="cartao-stat" v-for="(s, i) in simuladosOrdenados" :key="s.semana"
              :class="s.total/60 >= 0.7 ? 'verde' : s.total/60 >= 0.5 ? 'laranja' : 'vermelho'">
              <div class="valor">{{ s.porcentagem }}%</div>
              <div class="rotulo">Simulado {{ i+1 }} (Semana {{ s.semana }})</div>
            </div>
            <div class="cartao-stat" v-if="simuladosOrdenados.length === 0">
              <div class="valor" style="font-size:20px;color:var(--texto-sec);">—</div>
              <div class="rotulo">Nenhum simulado registrado</div>
            </div>
          </div>

          <div class="card">
            <div class="card-titulo">Registrar Simulado</div>
            <div class="form-simulado">
              <div>
                <label>Semana</label>
                <input type="number" v-model.number="formSimulado.semana" min="1" :max="semanasPlano">
              </div>
              <div>
                <label>Português (/10)</label>
                <input type="number" v-model.number="formSimulado.portugues" min="0" max="10">
              </div>
              <div>
                <label>Matemática (/10)</label>
                <input type="number" v-model.number="formSimulado.matematica" min="0" max="10">
              </div>
              <div>
                <label>Química (/38)</label>
                <input type="number" v-model.number="formSimulado.quimica" min="0" max="38">
              </div>
              <div>
                <label>Total /60</label>
                <input type="number" :value="formSimuladoTotal" disabled style="background:#f3f4f6;font-weight:700;">
              </div>
              <div>
                <label>&nbsp;</label>
                <button @click="salvarSimulado">Salvar</button>
              </div>
            </div>
          </div>

          <div class="card">
            <div class="card-titulo">Histórico</div>
            <table class="tabela-simulados">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Semana</th>
                  <th>Português</th>
                  <th>Matemática</th>
                  <th>Química</th>
                  <th>Total</th>
                  <th>%</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                <tr v-for="(s, i) in simuladosOrdenados" :key="s.semana">
                  <td>{{ i+1 }}</td>
                  <td>{{ s.semana }}</td>
                  <td>{{ s.portugues }}/10</td>
                  <td>{{ s.matematica }}/10</td>
                  <td>{{ s.quimica }}/38</td>
                  <td><strong>{{ s.total }}/60</strong></td>
                  <td :style="{ color: s.porcentagem >= 70 ? 'var(--sucesso)' : s.porcentagem >= 50 ? 'var(--aviso)' : 'var(--erro)', fontWeight: 700 }">
                    {{ s.porcentagem }}%
                  </td>
                  <td><button @click="removerSimulado(s.semana)" style="background:none;border:none;cursor:pointer;color:var(--erro);font-size:16px;">✕</button></td>
                </tr>
                <tr v-if="simuladosOrdenados.length === 0">
                  <td colspan="8" style="color:var(--texto-sec);padding:20px;">Nenhum simulado registrado ainda.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </template>

        <!-- CICLO DE ESTUDOS -->
        <template v-if="view === 'ciclo'">
          <div class="grade-cartoes">
            <div class="cartao-stat" :style="{ borderTopColor: '#8b5cf6' }">
              <div class="valor" style="font-size:24px;color:#8b5cf6;">{{ materiaAtual.materia }}</div>
              <div class="rotulo">Próxima matéria do ciclo</div>
            </div>
            <div class="cartao-stat" :style="{ borderTopColor: '#8b5cf6' }">
              <div class="valor" style="font-size:24px;color:#8b5cf6;">{{ materiaAtual.tempo }} min</div>
              <div class="rotulo">Tempo sugerido para hoje</div>
            </div>
            <div class="cartao-stat" :class="cicloCompleto >= 100 ? 'verde' : ''">
              <div class="valor">{{ cicloCompleto }}%</div>
              <div class="rotulo">Ciclo completo</div>
            </div>
          </div>

          <div class="card">
            <div class="card-titulo">
              <span>Sequência do Ciclo</span>
              <button @click="cicloExpandido = !cicloExpandido" style="background:none;border:1px solid var(--borda);border-radius:6px;padding:6px 14px;cursor:pointer;font-size:13px;">
                {{ cicloExpandido ? 'Recolher' : 'Expandir' }}
              </button>
            </div>
            <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;">
              <div v-for="(m, i) in CICLO_ESTUDOS" :key="i"
                style="display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:8px;font-size:13px;cursor:default;"
                :style="{
                  background: i === ciclo.posicao ? '#8b5cf6' : ciclo.concluido[m.materia+'-c'+i] ? '#10b981' : 'var(--bg)',
                  color: i === ciclo.posicao ? '#fff' : ciclo.concluido[m.materia+'-c'+i] ? '#fff' : 'var(--texto)',
                  border: '1px solid ' + (i === ciclo.posicao ? '#8b5cf6' : 'var(--borda)')
                }">
                <span>{{ m.icone }}</span>
                <span>{{ m.materia }}</span>
                <span style="opacity:0.7;font-size:12px;">{{ m.tempo }}min</span>
              </div>
            </div>
            <div style="display:flex;gap:12px;flex-wrap:wrap;">
              <button @click="avancarCiclo" style="padding:10px 24px;background:#8b5cf6;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-family:inherit;">
                Concluí esta matéria → Avançar
              </button>
              <button @click="reiniciarCiclo" style="padding:10px 24px;background:transparent;color:var(--texto-sec);border:1px solid var(--borda);border-radius:8px;cursor:pointer;font-size:14px;font-family:inherit;">
                Reiniciar Ciclo
              </button>
            </div>
          </div>

          <div class="card">
            <div class="card-titulo">Metodologia da Sessão</div>
            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;font-size:14px;">
              <div style="padding:12px;background:var(--bg);border-radius:8px;">
                <strong style="color:var(--primaria);display:block;margin-bottom:4px;">0-25 min</strong>
                Teoria / Videoaula
              </div>
              <div style="padding:12px;background:var(--bg);border-radius:8px;">
                <strong style="color:var(--aviso);display:block;margin-bottom:4px;">25-30 min</strong>
                Pausa
              </div>
              <div style="padding:12px;background:var(--bg);border-radius:8px;">
                <strong style="color:var(--sucesso);display:block;margin-bottom:4px;">30-55 min</strong>
                Active Recall + Questões
              </div>
              <div style="padding:12px;background:var(--bg);border-radius:8px;">
                <strong style="color:var(--erro);display:block;margin-bottom:4px;">55-60 min</strong>
                Pausa
              </div>
              <div style="padding:12px;background:var(--bg);border-radius:8px;">
                <strong style="color:#8b5cf6;display:block;margin-bottom:4px;">60-80 min</strong>
                Correção + Caderno de Erros
              </div>
            </div>
            <div style="margin-top:16px;padding:16px;background:#fef3c7;border-radius:8px;font-size:13px;color:#92400e;">
              💡 <strong>Tática dos 60%:</strong> Na prova, resolva primeiro as questões mais rápidas e fáceis de cada matéria. Deixe as longas e complexas para o final.
            </div>
          </div>
        </template>

        <!-- CADERNO DE ERROS -->
        <template v-if="view === 'erros'">
          <div class="grade-cartoes">
            <div class="cartao-stat vermelho">
              <div class="valor">{{ totalErros }}</div>
              <div class="rotulo">Total de erros registrados</div>
            </div>
            <div class="cartao-stat" v-for="(errList, mat) in errosAgrupados" :key="mat">
              <div class="valor" style="font-size:24px;">{{ errList.length }}</div>
              <div class="rotulo">{{ mat }}</div>
            </div>
          </div>

          <div class="card">
            <div class="card-titulo">
              <span>{{ editandoErro ? (editandoErro.id ? 'Editar Erro' : 'Novo Erro') : 'Caderno de Erros' }}</span>
            </div>
            <div v-if="editandoErro" class="form-simulado">
              <div>
                <label>Matéria</label>
                <select v-model="editandoErro.materia" style="width:100%;padding:8px 10px;border:1px solid var(--borda);border-radius:6px;font-size:14px;font-family:inherit;background:var(--card);color:var(--texto);">
                  <option value="">Selecione...</option>
                  <option>Português</option>
                  <option>Matemática</option>
                  <option>Química</option>
                </select>
              </div>
              <div>
                <label>Tópico</label>
                <input v-model="editandoErro.topico" placeholder="Ex: pH, Estequiometria">
              </div>
              <div>
                <label>O que pensei (erro)</label>
                <input v-model="editandoErro.pensamento" placeholder="Seu raciocínio na hora">
              </div>
              <div>
                <label>Resposta correta</label>
                <input v-model="editandoErro.respostaCorreta" placeholder="O que deveria ser">
              </div>
              <div>
                <label>Lacuna identificada</label>
                <input v-model="editandoErro.lacuna" placeholder="O que faltou saber">
              </div>
              <div>
                <label>Tipo de erro</label>
                <select v-model="editandoErro.tipo" style="width:100%;padding:8px 10px;border:1px solid var(--borda);border-radius:6px;font-size:14px;font-family:inherit;background:var(--card);color:var(--texto);">
                  <option value="A">A - Desconhecimento</option>
                  <option value="B">B - Confusão</option>
                  <option value="C">C - Atenção</option>
                </select>
              </div>
              <div>
                <label>Descrição</label>
                <input v-model="editandoErro.descricao" placeholder="Descreva o contexto">
              </div>
              <div style="display:flex;gap:8px;">
                <button @click="salvarErro" style="flex:1;">Salvar</button>
                <button @click="cancelarErro" style="flex:1;background:var(--texto-sec);">Cancelar</button>
              </div>
            </div>
            <div v-else>
              <button @click="novoErro" style="margin-bottom:16px;padding:8px 20px;background:var(--primaria);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-family:inherit;">
                + Novo Erro
              </button>
              <div v-for="(errList, mat) in errosAgrupados" :key="mat" style="margin-bottom:20px;">
                <h4 style="font-size:14px;margin-bottom:8px;color:var(--texto-sec);text-transform:uppercase;">{{ mat }} ({{ errList.length }})</h4>
                <div v-if="errList.length === 0" style="font-size:13px;color:var(--texto-sec);padding:8px 0;">Nenhum erro registrado.</div>
                <div v-for="e in errList" :key="e.id" style="padding:12px;border:1px solid var(--borda);border-radius:8px;margin-bottom:8px;font-size:14px;">
                  <div style="display:flex;justify-content:space-between;align-items:start;gap:8px;">
                    <div style="flex:1;">
                      <strong>{{ e.topico }}</strong>
                      <span :style="{
                        display:'inline-block',
                        marginLeft:'8px',
                        padding:'2px 8px',
                        borderRadius:'4px',
                        fontSize:'12px',
                        fontWeight:600,
                        background: e.tipo === 'A' ? '#fef3c7' : e.tipo === 'B' ? '#dbeafe' : '#fce7f3',
                        color: e.tipo === 'A' ? '#92400e' : e.tipo === 'B' ? '#1e40af' : '#9d174d'
                      }">{{ e.tipo === 'A' ? 'Desconhecimento' : e.tipo === 'B' ? 'Confusão' : 'Atenção' }}</span>
                      <div style="margin-top:6px;font-size:13px;color:var(--texto-sec);">
                        <div><strong>Pensei:</strong> {{ e.pensamento }}</div>
                        <div><strong>Correto:</strong> {{ e.respostaCorreta }}</div>
                        <div v-if="e.lacuna"><strong>Lacuna:</strong> {{ e.lacuna }}</div>
                      </div>
                    </div>
                    <div style="display:flex;gap:4px;flex-shrink:0;">
                      <button @click="agendarRevisao(e.topico, e.materia, e.data)" title="Agendar revisão espaçada" style="background:none;border:none;cursor:pointer;font-size:16px;padding:4px;">📅</button>
                      <button @click="editarErro(e)" title="Editar" style="background:none;border:none;cursor:pointer;font-size:16px;padding:4px;">✏️</button>
                      <button @click="removerErro(e.id)" title="Remover" style="background:none;border:none;cursor:pointer;font-size:16px;padding:4px;color:var(--erro);">✕</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </template>

        <!-- DIÁRIO (DAILY CHECKLIST) -->
        <template v-if="view === 'diario'">
          <div class="grade-cartoes">
            <div class="cartao-stat" :class="diarioProgresso >= 100 ? 'verde' : diarioProgresso >= 50 ? 'laranja' : 'vermelho'">
              <div class="valor">{{ diarioProgresso }}%</div>
              <div class="rotulo">Checklist de hoje</div>
            </div>
            <div class="cartao-stat">
              <div class="valor" style="font-size:20px;">{{ revisoesHoje.length }}</div>
              <div class="rotulo">Revisões pendentes hoje</div>
            </div>
          </div>

          <div class="card">
            <div class="card-titulo">
              <input type="date" v-model="diarioData" style="padding:8px 12px;border:1px solid var(--borda);border-radius:6px;font-size:14px;font-family:inherit;">
            </div>
            <div v-for="item in CHECKLIST_ITENS" :key="item.id" class="item-check"
              :class="{ concluido: diarioHoje[item.id] }"
              @click="alternarDiario(item.id)">
              <input type="checkbox" :checked="diarioHoje[item.id]" @click.stop>
              <span class="texto">{{ item.texto }}</span>
            </div>
            <div style="margin-top:16px;padding:12px;background:var(--bg);border-radius:8px;font-size:13px;color:var(--texto-sec);">
              💡 Sequência ideal: 1. Teoria → 2. Active Recall → 3. Questões → 4. Correção/Erros → 5. Registrar tudo
            </div>
          </div>

          <div class="card">
            <div class="card-titulo">Revisões Agendadas (Revisão Espaçada)</div>
            <div v-if="revisoesPendentes.length === 0" style="font-size:13px;color:var(--texto-sec);padding:8px 0;">
              Nenhuma revisão pendente. Registre erros no caderno e agende revisões pelo botão 📅.
            </div>
            <div v-for="r in revisoesPendentes" :key="r.id" style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--borda);font-size:14px;">
              <div>
                <strong>{{ r.topico }}</strong>
                <span style="color:var(--texto-sec);font-size:12px;margin-left:8px;">{{ r.materia }} · {{ r.intervalo }}</span>
                <span v-if="r.data === new Date().toISOString().slice(0,10)" style="color:var(--erro);font-size:12px;margin-left:8px;">🔴 Hoje!</span>
              </div>
              <div style="display:flex;gap:4px;">
                <button @click="concluirRevisao(r.id)" style="background:var(--sucesso);color:#fff;border:none;border-radius:4px;padding:4px 10px;cursor:pointer;font-size:12px;">✓ Concluída</button>
                <button @click="removerRevisao(r.id)" style="background:none;border:none;cursor:pointer;font-size:14px;color:var(--erro);">✕</button>
              </div>
            </div>
          </div>
          </template>
        </div> 
      </transition>
    </main>

    <footer class="rodape">
      <div class="conteudo-rodape">
        <p>🎓 Desenvolvido por <strong>Rafael Elias Ioppi</strong></p>
        <p style="font-size:12px;color:var(--texto-sec);margin-top:4px;">
          Plano de Estudos | Concurso Petrobras 2026 | Cesgranrio
        </p>
      </div>
    </footer>
    </template>
  </div>

  <script src="js/dados.js"></script>
  <script src="js/armazenamento.js"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
